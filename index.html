            flex-direction: column;
            align-items: center;

        /* 이미지 컨테이너 스타일 */

        /* 이미지 개별 스타일 */
        img {
            display: block; /* 이미지 사이의 미세한 간격 제거 */
            width: 100%;    /* 부모 컨테이너 너비에 맞춤 */
            height: auto;   /* 비율 유지 */
            border: none;
        }

        /* 하단 여백이나 버튼 추가 공간 (선택) */
        .footer {
            padding: 40px 0;
        }
    </style>
